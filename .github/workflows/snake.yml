name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:


permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Generate the snake animation
        uses: Platane/snk@v3  # Nâng cấp lên v3
        id: snake-gif
        with:

          github_user_name: TTPzZ
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=orange
            dist/github-contribution-grid-snake-dark.svg?color_snake=white&color_dots=#161b22,#4a1c40,#8c275f,#d93874,#f56296

      - name: Push the output to a new branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
