name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# Khai báo rõ ràng quyền được phép ghi đè file lên repository
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Generate the snake animation
        uses: Platane/snk@v3  # Nâng cấp lên v3
        id: snake-gif
        with:
          # Cố định luôn tên tài khoản của thầy, bỏ qua việc dùng biến
          github_user_name: TTPzZ
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push the output to a new branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
